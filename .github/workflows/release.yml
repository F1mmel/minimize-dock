name: Build and Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build macOS App
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app || \
          sudo xcode-select -s /Applications/Xcode_16.1.app || \
          sudo xcode-select -s /Applications/Xcode_16.0.app || \
          sudo xcode-select -s /Applications/Xcode_16.app || \
          true
          xcodebuild -version

      - name: Build App
        run: |
          xcodebuild -project DockMinimize.xcodeproj \
                     -scheme DockMinimize \
                     -configuration Release \
                     -derivedDataPath BuildData \
                     -sdk macosx \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     build

      - name: Prepare Release Asset
        run: |
          mv BuildData/Build/Products/Release/DockMinimize.app .
          zip -r DockMinimize.zip DockMinimize.app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          files: DockMinimize.zip
          draft: false
          prerelease: false
          name: "DockMinimize v1.0.${{ github.run_number }}"
          body: |
            Automated build and release of DockMinimize (Build #${{ github.run_number }}).
            
            ### 🚦 Installation
            1. Download the `DockMinimize.zip` asset below.
            2. Unzip it and move `DockMinimize.app` to your `/Applications` folder.
            3. Since this build is compiled on GitHub Actions without code signing certificates:
               - To open the app the first time, **right-click (or control-click) the app icon** in Finder and select **Open**. Click **Open** again in the warning dialog.
            4. Grant Accessibility Permissions in System Settings when prompted.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
